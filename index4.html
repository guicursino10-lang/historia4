<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Acervo de Histórias</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --ink: #1a1008;
            --parchment: #f5efe3;
            --parchment-dark: #e8dcc8;
            --sepia: #8b6340;
            --sepia-light: #c4a47c;
            --sepia-deep: #5c3d1e;
            --gold: #d4a843;
            --gold-light: #f0cc7a;
            --cream: #faf6ed;
            --pdf-red: #c0392b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--parchment);
            background-image: radial-gradient(ellipse at 20% 20%, rgba(212,168,67,0.08) 0%, transparent 50%);
            font-family: 'Crimson Pro', serif;
            color: var(--ink);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        header { text-align: center; padding: 40px 20px; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--sepia-deep); }
        header h1 span { color: var(--gold); }

        .toolbar {
            max-width: 900px; margin: 0 auto 20px; padding: 0 20px;
            display: flex; gap: 10px; flex-wrap: wrap;
        }

        .search-input {
            flex: 1; min-width: 200px; padding: 12px;
            border: 1px solid var(--sepia-light); border-radius: 5px;
            background: var(--cream);
        }

        .btn {
            padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;
            font-weight: 600; transition: 0.2s;
        }
        .btn-primary { background: var(--sepia-deep); color: white; }
        .btn-pdf { background: var(--pdf-red); color: white; }

        .grid {
            max-width: 900px; margin: 20px auto; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
        }

        .card {
            background: var(--cream); border: 1px solid var(--parchment-dark);
            padding: 20px; border-radius: 8px; cursor: pointer;
            transition: 0.3s; position: relative;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--sepia-deep); margin-bottom: 10px; }
        
        .card-actions { display: flex; gap: 15px; margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px; }
        .card-actions button { background: none; border: none; cursor: pointer; font-size: 1.2rem; }

        .overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 100; align-items: center; justify-content: center; padding: 20px;
        }
        .overlay.open { display: flex; }
        
        .modal {
            background: var(--cream); padding: 30px; border-radius: 8px;
            width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto;
        }

        textarea, input, select {
            width: 100%; padding: 10px; margin: 10px 0;
            border: 1px solid var(--sepia-light); border-radius: 4px;
        }

        .story-body { white-space: pre-wrap; line-height: 1.8; font-size: 1.1rem; }
    </style>
</head>
<body>

<header>
    <h1>Minhas <span>Histórias</span></h1>
</header>

<div class="toolbar">
    <input type="text" id="searchInput" class="search-input" placeholder="Buscar história..." oninput="renderCards()">
    <button class="btn btn-primary" onclick="openModal('editOverlay')">+ Texto</button>
    <button class="btn btn-pdf" onclick="openModal('pdfOverlay')">📄 PDF</button>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="editOverlay">
    <div class="modal">
        <h2>Nova História</h2>
        <input type="text" id="fTitle" placeholder="Título">
        <select id="fGenre">
            <option>Conto</option><option>Fantasia</option><option>Ficção</option>
        </select>
        <textarea id="fBody" rows="10" placeholder="Escreva aqui..."></textarea>
        <button class="btn btn-primary" onclick="saveStory()">Salvar</button>
        <button onclick="closeModal('editOverlay')">Fechar</button>
    </div>
</div>

<div class="overlay" id="pdfOverlay">
    <div class="modal">
        <h2>Importar PDF</h2>
        <input type="file" id="pdfFile" accept=".pdf">
        <p id="pdfStatus"></p>
        <button class="btn btn-pdf" onclick="processPDF()">Processar e Salvar</button>
        <button onclick="closeModal('pdfOverlay')">Fechar</button>
    </div>
</div>

<div class="overlay" id="readOverlay">
    <div class="modal" style="max-width: 800px;">
        <h2 id="readTitle"></h2>
        <div id="readContent" class="story-body"></div>
        <br>
        <button class="btn btn-primary" onclick="closeModal('readOverlay')">Fechar</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'acervo_geografia_v1';
    let stories = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(stories));
        renderCards();
    }

    function openModal(id) {
